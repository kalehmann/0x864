---
when:
    event: "push"
steps:
    - name: "Fix permissions for rootless containers"
      image: "git.kalehmann.de/infrastructure/dockerimages/bash:latest"
      commands:
          - "chown -R 1000:1000 ."
    - name: "Stage 0 (build with nasm & tcc)"
      image: "git.kalehmann.de/karsten/0x864:latest"
      commands:
          - "make"
      depends_on:
          - "Fix permissions for rootless containers"
    - name: "Stage 1 (build with 0x864 & tcc)"
      image: "git.kalehmann.de/karsten/0x864:latest"
      commands:
          - "mv src/0x864.s.o src/0x864.s.stage0.o"
          - "./src/0x864 -felf64 -o src/0x864.s.o src/0x864.s"
          - "rm -rf src/0x864"
          - "make"
      depends_on:
          - "Stage 0 (build with nasm & tcc)"
    - name: "Compare stage 0 with stage 1"
      image: "git.kalehmann.de/karsten/0x864:latest"
      commands:
          - "mv src/0x864.s.o src/0x864.s.stage1.o"
          - "diff src/0x864.s.stage0.o src/0x864.s.stage1.o > /dev/null"
      depends_on:
          - "Stage 1 (build with 0x864 & tcc)"
    - name: "Stage 2 (build with 0x864 & tcc)"
      image: "git.kalehmann.de/karsten/0x864:latest"
      commands:
          - "./src/0x864 -felf64 -o src/0x864.s.o src/0x864.s"
          - "rm -rf src/0x864"
          - "make"
      depends_on:
          - "Compare stage 0 with stage 1"
    - name: "Compare stage 1 with stage 2"
      image: "git.kalehmann.de/karsten/0x864:latest"
      commands:
          - "mv src/0x864.s.o src/0x864.s.stage2.o"
          - "diff src/0x864.s.stage1.o src/0x864.s.stage2.o > /dev/null"
      depends_on:
          - "Stage 2 (build with 0x864 & tcc)"
depends_on:
    - "tests"
...
